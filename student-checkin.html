<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คอินกิจกรรม — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">เช็คอินกิจกรรม</h1>
      <p class="text-sm text-slate-500 mt-1" id="ci-subtitle">ทำให้ครบทุกขั้นตอนที่กิจกรรมนี้กำหนดไว้ — ทำวิธีปกติไม่ได้ ขอรหัสฉุกเฉินจากสตาฟหน้างานแทนได้เสมอ</p>
    </div>

    <div id="ci-event" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"></div>

    <!-- สรุปความคืบหน้า -->
    <div id="ci-progress-summary"></div>

    <!-- ขั้นตอนที่ต้องทำ (แสดงพร้อมกันทุกขั้นตอนที่กิจกรรมกำหนด — ทำครบกี่ขั้นก็ได้ ไม่บังคับลำดับ) -->
    <div id="ci-steps" class="space-y-4"></div>

    <!-- ผลลัพธ์เมื่อทำครบ/บายพาสสำเร็จ -->
    <div id="ci-final-result"></div>

    <!-- ทางบายพาสฉุกเฉิน (Master Code) -->
    <div id="ci-bypass"></div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/student.js"></script>
<script>
  renderShell({ role: 'student', active: 'student-checkin.html', title: 'เช็คอินกิจกรรม' });
  initCheckinPage();
</script>
</body>
</html>
