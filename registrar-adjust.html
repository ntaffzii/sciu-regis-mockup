<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แก้ไขหน่วยกิตรายบุคคล — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <nav class="flex items-center gap-2 text-sm text-slate-400" aria-label="breadcrumb">
      <a href="registrar-home.html" class="hover:text-blue-600 transition inline-flex items-center gap-1" id="bc-home">หน้าแรก</a>
      <span class="text-slate-300">/</span>
      <a href="registrar-export.html" class="hover:text-blue-600 transition">กิจกรรม</a>
      <span class="text-slate-300">/</span>
      <span class="text-slate-600 font-medium">แก้ไขหน่วยกิต</span>
    </nav>

    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">แก้ไขหน่วยกิตรายบุคคล</h1>
        <p class="text-sm text-slate-500 mt-1">กิจกรรม: <span class="font-medium text-slate-700">ค่ายจิตอาสาพัฒนาโรงเรียนบ้านดอนงัว</span> (3 วัน, 20–22 มิ.ย. 2569) — สถานะเช็คอินรายวันของผู้เข้าร่วม</p>
      </div>
      <span class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-full px-3 py-1.5 inline-flex items-center gap-1.5" id="reason-note">การแก้ไขทุกครั้งต้องกรอกเหตุผล และถูกบันทึกลง Audit Log</span>
    </div>

    <div class="flex flex-wrap items-center gap-3">
      <div class="relative flex-1 min-w-[220px]">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" id="ic-search"></span>
        <input id="adjust-search" type="text" placeholder="ค้นหาชื่อ / รหัสนักศึกษา..." class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600/30 focus:border-blue-600" aria-label="ค้นหารายชื่อ">
      </div>
    </div>

    <!-- Bulk action bar -->
    <div id="bulk-bar" class="hidden sticky top-16 z-40 rounded-2xl border border-blue-200 bg-blue-50/95 backdrop-blur px-4 py-3 flex items-center justify-between gap-3 shadow-sm">
      <p class="text-sm text-blue-800">เลือกแล้ว <span id="bulk-count" class="font-bold font-mono">0</span> คน</p>
      <button id="btn-bulk-adjust" class="inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-800 transition shadow-lg shadow-blue-600/20" type="button">
        <span id="ic-bulk"></span> แก้ไขหน่วยกิตพร้อมกัน
      </button>
    </div>

    <div id="adjust-table" class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm"></div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/registrar.js"></script>
<script>
  renderShell({ role: 'registrar', active: 'registrar-adjust.html', title: 'แก้ไขหน่วยกิตรายบุคคล' });
  document.getElementById('bc-home').insertAdjacentHTML('afterbegin', icon('home', 'w-4 h-4'));
  document.getElementById('ic-search').innerHTML = icon('search', 'w-4 h-4');
  document.getElementById('ic-bulk').innerHTML = icon('edit', 'w-4 h-4');
  document.getElementById('reason-note').insertAdjacentHTML('afterbegin', icon('alert-triangle', 'w-3.5 h-3.5'));
  initAdjustPage();
</script>
</body>
</html>
