<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรก Lead Org — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">สวัสดี, อาจารย์วิชัย</h1>
        <p class="text-sm text-slate-500 mt-1">ภาพรวมกิจกรรมที่คุณจัด และรายชื่อที่ต้องยืนยันความถูกต้อง</p>
      </div>
      <a href="registrar-event-form.html" class="inline-flex items-center gap-2 px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-800 transition shadow-lg shadow-blue-600/20" id="btn-create">สร้างกิจกรรมใหม่</a>
    </div>

    <div id="lo-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
    <div id="lo-pending-banner"></div>

    <div id="events" class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100">
        <h2 class="text-base font-semibold text-slate-800">กิจกรรมที่ต้องดำเนินการ</h2>
      </div>
      <div id="lo-events" class="divide-y divide-slate-50"></div>
    </div>

    <div id="rosters" class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100">
        <h2 class="text-base font-semibold text-slate-800">กำหนดการยืนยันรายชื่อ</h2>
        <p class="text-xs text-slate-400 mt-0.5">กรุณายืนยันรายชื่อภายใน 3 วันหลังจบกิจกรรม — เกินกำหนดระบบจะแจ้ง Registrar ทาง Slack</p>
      </div>
      <div id="lo-rosters" class="divide-y divide-slate-50"></div>
    </div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/registrar.js"></script>
<script>
  renderShell({ role: 'lead-org', active: 'lead-org-home.html', title: 'หน้าแรก Lead Org' });
  document.getElementById('btn-create').insertAdjacentHTML('afterbegin', icon('plus', 'w-4 h-4'));

  const MY_EVENTS = [
    { id: 5, name: 'จิตอาสาพัฒนาคณะวิทยาศาสตร์', status: 'ongoing', date: '2–3 ก.ค. 2569', joined: 51, total: 55, gps: true, rosterDue: null },
    { id: 6, name: 'ปลูกป่าชายเลนเฉลิมพระเกียรติ', status: 'ended', date: '8 ก.ค. 2569', joined: 36, total: 40, gps: false, rosterDue: 'เกินกำหนดยืนยัน 2 วัน' },
    { id: 2, name: 'Science Open House 2569', status: 'upcoming', date: '15 ก.ค. 2569', joined: 0, total: 250, gps: true, rosterDue: null },
  ];

  // FR-B8/UC-R23: นับรูปเซลฟี่ที่ยังไม่ตรวจของกิจกรรมที่ตัวเองจัดทั้งหมด
  const pendingSelfieCount = MY_EVENTS.reduce((sum, e) => {
    const roster = RegDB.rosters[e.id];
    if (!roster) return sum;
    return sum + roster.students.filter((s) => s.selfie && s.selfie.reviewStatus === 'pending').length;
  }, 0);

  document.getElementById('lo-stats').innerHTML =
    statsCard('กำลังจัดอยู่', MY_EVENTS.filter((e) => e.status === 'ongoing').length, 'กิจกรรม active')
    + statsCard('กำลังจะถึง', MY_EVENTS.filter((e) => e.status === 'upcoming').length, 'กิจกรรมล่วงหน้า')
    + statsCard('รายชื่อค้างยืนยัน', MY_EVENTS.filter((e) => e.rosterDue).length, 'เกินกำหนดแล้ว', { valueCls: 'text-red-500' })
    + statsCard('เซลฟี่รอตรวจ', pendingSelfieCount, 'รายการ (FR-B7)', { valueCls: pendingSelfieCount ? 'text-amber-600' : 'text-slate-900' });

  document.getElementById('lo-pending-banner').innerHTML = pendingSelfieCount ? `
    <a href="checkin-review.html" class="flex items-center justify-between gap-3 rounded-2xl border border-amber-200 bg-amber-50 p-4 hover:bg-amber-100 transition">
      <span class="text-sm text-amber-800">${icon('camera', 'w-4 h-4')} มีรูปเซลฟี่รอตรวจสอบ ${pendingSelfieCount} รายการ ก่อนแจกหน่วยกิตให้นักศึกษา</span>
      <span class="text-xs font-semibold text-amber-700 inline-flex items-center gap-1">ไปตรวจสอบการเช็คอิน ${icon('chevron-right', 'w-3.5 h-3.5')}</span>
    </a>` : '';

  const stMap = {
    ongoing: statusBadge('ready', 'กำลังจัด'),
    ended: statusBadge('pending', 'จบแล้ว — รอยืนยันรายชื่อ'),
    upcoming: statusBadge('open', 'กำลังจะถึง'),
  };
  document.getElementById('lo-events').innerHTML = MY_EVENTS.map((e) => `
    <div class="px-5 py-4">
      <div class="flex flex-wrap items-start justify-between gap-2">
        <div class="min-w-0">
          <p class="text-sm font-medium text-slate-800">${e.name}</p>
          <p class="text-xs text-slate-400 mt-0.5">${e.date} • เช็คอินแล้ว <span class="font-mono">${e.joined}/${e.total}</span> คน</p>
        </div>
        ${stMap[e.status]}
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        ${e.status === 'ended' ? `<button onclick="showToast('ยืนยันรายชื่อกิจกรรมนี้เรียบร้อยแล้ว (จำลอง)')" class="text-xs font-medium text-white bg-green-700 hover:bg-green-800 rounded-lg px-3 py-1.5 transition">${icon('check-circle', 'w-3.5 h-3.5')} ยืนยันรายชื่อ</button>` : ''}
        ${e.status === 'ongoing' ? `<a href="#" onclick="Store.set('eventId','${e.id}');window.location.href='field-staff-home.html';return false;" class="text-xs font-medium text-white bg-blue-600 hover:bg-blue-800 rounded-lg px-3 py-1.5 transition">ดูหน้างาน</a>` : ''}
        ${e.gps ? `<a href="registrar-event-form.html" class="text-xs font-medium text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-lg px-3 py-1.5 transition inline-flex items-center gap-1">${icon('map-pin', 'w-3.5 h-3.5')} ตั้งค่า GPS</a>` : ''}
        <button onclick="showToast('เปิดรายชื่อผู้เข้าร่วม (จำลอง)', 'info')" class="text-xs font-medium text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-lg px-3 py-1.5 transition">ดูผู้เข้าร่วม</button>
      </div>
    </div>`).join('');

  document.getElementById('lo-rosters').innerHTML = MY_EVENTS.filter((e) => e.status !== 'upcoming').map((e) => `
    <div class="flex flex-wrap items-center justify-between gap-3 px-5 py-3.5">
      <div class="min-w-0">
        <p class="text-sm text-slate-700">${e.name}</p>
        <p class="text-xs text-slate-400 mt-0.5">${e.date}</p>
      </div>
      ${e.rosterDue
        ? `<span class="inline-flex items-center gap-1.5 text-xs font-semibold text-red-600 bg-red-50 border border-red-200 rounded-full px-2.5 py-1">${icon('alert-triangle', 'w-3.5 h-3.5')} ${e.rosterDue}</span>`
        : statusBadge('info', 'ยังไม่ถึงกำหนด')}
    </div>`).join('');
</script>
</body>
</html>
