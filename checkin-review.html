<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบการเช็คอิน — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <nav class="flex items-center gap-2 text-sm text-slate-400" aria-label="breadcrumb">
      <a href="#" id="bc-home" class="hover:text-blue-600 transition inline-flex items-center gap-1">หน้าแรก</a>
      <span class="text-slate-300">/</span>
      <span class="text-slate-600 font-medium">ตรวจสอบการเช็คอิน</span>
    </nav>

    <div class="flex flex-wrap items-end justify-between gap-3">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">ตรวจสอบการเช็คอิน</h1>
        <p class="text-sm text-slate-500 mt-1">ดูรายละเอียดหลักฐานเช็คอินทุกวิธี (GPS / Selfie / Master Code) และอนุมัติรูปเซลฟี่ที่ค้างตรวจ (FR-B8, UC-R23)</p>
      </div>
    </div>

    <!-- เลือกกิจกรรม -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="space-y-1.5">
        <label class="text-sm font-medium text-slate-700" for="cr-event">เลือกกิจกรรม</label>
        <select id="cr-event" class="w-full sm:w-96 px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-600/30 focus:border-blue-600">
          <option value="">-- กรุณาเลือกกิจกรรม --</option>
        </select>
      </div>
    </div>

    <div id="cr-empty-start" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="py-12 text-center">
        <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-3 text-slate-300" id="ic-empty-start"></div>
        <p class="text-sm text-slate-400">เลือกกิจกรรมจาก dropdown ด้านบนเพื่อดูรายชื่อที่เช็คอิน</p>
      </div>
    </div>

    <div id="cr-body" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">
      <!-- คิวซ้าย: รายชื่อทั้งหมดที่เช็คอิน -->
      <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden h-fit">
        <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
          <h2 class="text-sm font-semibold text-slate-700">รายชื่อที่เช็คอิน</h2>
          <span id="cr-queue-count"></span>
        </div>
        <div id="cr-queue" class="divide-y divide-slate-50 max-h-[560px] overflow-y-auto"></div>
      </div>

      <!-- รายละเอียดขวา -->
      <div class="lg:col-span-3">
        <div id="cr-detail" class="rounded-2xl border border-slate-200 bg-white shadow-sm p-6 space-y-5">
          <div class="text-center py-12 text-sm text-slate-400">เลือกรายชื่อทางซ้ายเพื่อดูรายละเอียด</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/registrar.js"></script>
<script>
  const role = getSessionRole();
  // เข้าถึงได้เฉพาะ Lead Org (กิจกรรมตัวเอง) และ Registrar (ทุกกิจกรรม) ตาม FR-B8/UC-R23
  if (role !== 'lead-org' && role !== 'registrar') {
    const homeRedirects = { student: 'student-home.html', admin: 'admin-home.html', 'field-staff': 'field-staff-home.html', guest: 'login.html' };
    window.location.href = homeRedirects[role] || 'login.html';
  } else {
    renderShell({ role: role, active: 'checkin-review.html', title: 'ตรวจสอบการเช็คอิน' });
    document.getElementById('bc-home').href = role === 'registrar' ? 'registrar-home.html' : 'lead-org-home.html';
    document.getElementById('bc-home').insertAdjacentHTML('afterbegin', icon('home', 'w-4 h-4'));
    document.getElementById('ic-empty-start').innerHTML = icon('users', 'w-7 h-7');
    initCheckinReviewPage();
  }
</script>
</body>
</html>
