<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรกนักศึกษา — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <div class="flex items-center gap-3">
      <span class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center" id="avatar"></span>
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">สวัสดี, คุณสมชาย</h1>
        <p class="text-sm text-slate-500">รหัสนักศึกษา <span class="font-mono">66114400123</span> • ปีการศึกษา 2569</p>
      </div>
    </div>

    <!-- Progress หน่วยกิตเปิดกว้าง -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm" id="sh-progress"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- ซ้าย: กิจกรรมเปิดรับ -->
      <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden h-fit">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <h2 class="text-base font-semibold text-slate-800">กิจกรรมที่กำลังเปิดรับ</h2>
          <a href="student-checkin.html" class="text-xs font-medium text-blue-600 hover:underline">ไปหน้าเช็คอิน</a>
        </div>
        <div id="sh-events" class="divide-y divide-slate-50"></div>
      </div>

      <!-- ขวา: ประวัติ + สถิติ + LINE -->
      <div class="space-y-6">
        <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-100">
            <h2 class="text-base font-semibold text-slate-800">ประวัติกิจกรรมล่าสุด</h2>
          </div>
          <div id="sh-history" class="divide-y divide-slate-50"></div>
        </div>
        <div id="sh-stats" class="grid grid-cols-3 gap-4"></div>
        <div id="sh-line"></div>
      </div>
    </div>
  </div>
</main>

<!-- Floating Action Button: SciU-Buddy -->
<a href="student-chatbot.html" class="fixed bottom-20 lg:bottom-8 right-4 lg:right-8 z-40 inline-flex items-center gap-2 px-4 py-3 bg-gradient-to-br from-blue-600 to-blue-500 text-white text-sm font-medium rounded-full shadow-xl shadow-blue-600/30 hover:-translate-y-0.5 transition" id="fab-chat">
  คุยกับ SciU-Buddy
</a>

<script src="js/shared.js"></script>
<script src="js/student.js"></script>
<script>
  renderShell({ role: 'student', active: 'student-home.html', title: 'หน้าแรกนักศึกษา' });
  document.getElementById('avatar').innerHTML = icon('user', 'w-6 h-6');
  document.getElementById('fab-chat').insertAdjacentHTML('afterbegin', icon('message-circle', 'w-5 h-5'));
  initStudentHome();
</script>
</body>
</html>
