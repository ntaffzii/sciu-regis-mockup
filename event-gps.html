<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผนที่กิจกรรม — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <style>
    #map { height: 100%; width: 100%; }
    .gps-info-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900 bg-slate-50/30">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8 flex flex-col">
  <!-- Header -->
  <div class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="javascript:history.back()" class="w-9 h-9 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 transition" aria-label="กลับ">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <div>
          <h1 class="text-lg font-bold text-slate-900">แผนที่กิจกรรม</h1>
          <p id="ev-name-header" class="text-sm text-slate-500">กำลังโหลด...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Map + Info -->
  <div class="flex-1 flex flex-col lg:flex-row max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-4 gap-4">
    <!-- Map container -->
    <div class="flex-1 min-h-[400px] lg:min-h-0 rounded-2xl overflow-hidden border border-slate-200 shadow-sm bg-slate-100 relative">
      <div id="map"></div>
      <div class="absolute bottom-3 left-3 z-[1000] text-[10px] text-slate-400 bg-white/80 backdrop-blur rounded-lg px-2 py-1 shadow-sm">
        คลิกเพื่อเลื่อน / ซูม
      </div>
    </div>

    <!-- Sidebar info -->
    <div class="w-full lg:w-72 space-y-3">
      <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-4 gps-info-card">
        <h2 class="text-sm font-semibold text-slate-700 flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          พิกัด GPS
        </h2>
        <div id="ev-coords" class="space-y-2 text-sm text-slate-600">
          <div class="flex items-center justify-between py-1.5 border-b border-slate-50">
            <span class="text-slate-400">ละติจูด</span>
            <span id="gps-lat" class="font-mono font-semibold text-slate-800">—</span>
          </div>
          <div class="flex items-center justify-between py-1.5 border-b border-slate-50">
            <span class="text-slate-400">ลองจิจูด</span>
            <span id="gps-lng" class="font-mono font-semibold text-slate-800">—</span>
          </div>
          <div class="flex items-center justify-between py-1.5">
            <span class="text-slate-400">รัศมี</span>
            <span id="gps-radius" class="font-mono font-semibold text-slate-800">—</span>
          </div>
        </div>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3 gps-info-card">
        <h2 class="text-sm font-semibold text-slate-700 flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          ข้อมูลกิจกรรม
        </h2>
        <div id="ev-info" class="text-sm text-slate-600 space-y-2">
          <p id="ev-subcat" class="text-xs font-semibold uppercase tracking-wider text-blue-600">—</p>
          <p id="ev-name" class="font-semibold text-slate-800">—</p>
          <p id="ev-date" class="text-xs text-slate-400">—</p>
          <p id="ev-location" class="text-xs text-slate-500 flex items-start gap-1.5 mt-1">
            <svg class="w-3.5 h-3.5 mt-0.5 shrink-0 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="ev-location-text">—</span>
          </p>
        </div>
      </div>

      <a href="javascript:history.back()" class="block w-full py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition text-center shadow-lg shadow-blue-600/20">
        กลับไปหน้ากิจกรรม
      </a>
    </div>
  </div>
</main>

<script src="js/shared.js"></script>
<script>
  renderShell({ active: 'event-gps.html', title: 'แผนที่กิจกรรม' });

  const DEFAULT_EVENTS = [
    { id: 1, name: 'ค่ายจิตอาสาพัฒนาโรงเรียนบ้านดอนงัว', date: '2026-06-20', days: 3, credits: 3.0, open: false, gps: true, lat: 15.1183, lng: 104.9057, radius: 30, participants: 100, checkedIn: 45, exportStatus: 'none', subcategory: 'บำเพ็ญประโยชน์/สิ่งแวดล้อม', eligible_participants: 'ทุกชั้นปี', location: 'โรงเรียนบ้านดอนงัว', contact_info: 'พี่ประยูร โทร. 081-234-xxxx', objectives: 'เพื่อบูรณะอาคารเรียน ทาสีสนามเด็กเล่น และส่งเสริมจิตสาธารณะของนิสิตวิทย์', schedule: 'วันแรก: 08:30 - ออกเดินทางคณะวิทย์ UBU\nวันที่สอง: 09:00 - กิจกรรมพัฒนาโรงเรียนเต็มวัน\nวันสุดท้าย: 13:00 - สรุปค่ายและเดินทางกลับ' },
    { id: 2, name: 'Science Open House 2569', date: '2026-07-15', days: 1, credits: 1.5, open: false, gps: true, lat: 15.1215, lng: 104.9101, radius: 50, participants: 250, checkedIn: 0, exportStatus: 'none', subcategory: 'วิชาการและวิชาชีพ', eligible_participants: 'นักศึกษาชั้นปีที่ 1 - 4', location: 'อาคารเคมี คณะวิทยาศาสตร์', contact_info: 'ดร.วิชัย งานวิชาการ คณะวิทย์', objectives: 'เพื่อเปิดบ้านแสดงผลงานนวัตกรรม และแนะแนววิทยาศาสตร์เชิงปฏิบัติการแก่นักเรียนภายนอก', registration_deadline: '2026-07-10', description: 'งาน Science Open House ประจำปี 2569 จัดโดยคณะวิทยาศาสตร์ มหาวิทยาลัยอุบลราชธานี เพื่อเปิดโอกาสให้นักเรียนระดับมัธยมศึกษาและนักศึกษาได้สัมผัสกับนวัตกรรมทางวิทยาศาสตร์ในสาขาต่าง ๆ อาทิ เคมี ชีววิทยา ฟิสิกส์ คณิตศาสตร์ และเทคโนโลยีสารสนเทศ พร้อมกิจกรรมเวิร์คช็อปเชิงปฏิบัติการ', schedule: '09:00 - พิธีเปิดโครงการ ณ หอประชุมคณะ\n10:00 - แยกย้ายประจำบูธแต่ละสาขา\n16:00 - พิธีปิดและมอบชั่วโมงกิจกรรม' },
    { id: 3, name: 'บริจาคโลหิต สภากาชาดไทย (เปิดกว้าง)', date: '2026-06-05', days: 1, credits: 1.0, open: true, gps: false, participants: 60, checkedIn: 58, exportStatus: 'confirmed', subcategory: 'บำเพ็ญประโยชน์/สิ่งแวดล้อม', eligible_participants: 'นักศึกษาทุกคณะ/ชั้นปี', location: 'หอประชุมไพจิตร คณะวิทย์', contact_info: 'สโมสรนักศึกษาคณะวิทยาศาสตร์ UBU', objectives: 'สนับสนุนโลหิตสำรองให้แก่โรงพยาบาลสรรพสิทธิประสงค์ และส่งเสริมการเสียสละเพื่อสังคม', schedule: '08:30 - เริ่มลงทะเบียนตรวจร่างกาย\n09:00 - 15:00 - ช่วงรับบริจาคโลหิตโดยหน่วยแพทย์เคลื่อนที่' },
    { id: 4, name: 'อบรมปฐมพยาบาลเบื้องต้น CPR', date: '2026-06-28', days: 1, credits: 1.5, open: false, gps: false, participants: 80, checkedIn: 74, exportStatus: 'exported', subcategory: 'กีฬา/สุขภาพ', eligible_participants: 'ทุกชั้นปี (เน้นสาขาวิทยาศาสตร์สุขภาพ)', location: 'ตึกฟิสิกส์ ห้อง 3102', contact_info: 'พี่สมจิตร งานพัฒนานักศึกษา', objectives: 'เพื่อเรียนรู้ทักษะการปฐมพยาบาลขั้นพื้นฐานและการกู้ชีพแบบ CPR อย่างถูกต้องปลอดภัย', schedule: '09:00 - บรรยายภาคทฤษฎี CPR\n13:00 - ฝึกปฏิบัติจริงกับหุ่นจำลอง\n16:00 - ประเมินผลหลังการอบรม' },
    { id: 5, name: 'จิตอาสาพัฒนาคณะวิทยาศาสตร์', date: '2026-07-02', days: 2, credits: 2.0, open: false, gps: true, lat: 15.1198, lng: 104.9077, radius: 40, participants: 55, checkedIn: 51, exportStatus: 'none', subcategory: 'บำเพ็ญประโยชน์/สิ่งแวดล้อม', eligible_participants: 'ทุกชั้นปี', location: 'ตึก SC18 และลานหน้าตึกวิจัย', contact_info: 'งานบริหารและสถานที่ คณะวิทย์', objectives: 'ช่วยบำรุงรักษาภูมิทัศน์ ทำความสะอาดจุดสาธารณะ ตึก SC18 ต้อนรับเปิดเทอมใหม่', schedule: 'วันที่ 1: 09:00 - 12:00 - เก็บกวาดลานกิจกรรมตึก SC18\nวันที่ 2: 13:00 - 16:30 - จัดระเบียบโต๊ะเก้าอี้และห้องสโมฯ' },
    { id: 6, name: 'ปลูกป่าชายเลนเฉลิมพระเกียรติ (เปิดกว้าง)', date: '2026-07-08', days: 1, credits: 2.0, open: true, gps: false, participants: 40, checkedIn: 36, exportStatus: 'none', subcategory: 'บำเพ็ญประโยชน์/สิ่งแวดล้อม', eligible_participants: 'ทุกชั้นปี (กิจกรรมนอกสถานที่)', location: 'ศูนย์เรียนรู้ป่าชายเลน จ.สมุทรสงคราม', contact_info: 'สโมสรนักศึกษา โทร. 089-xxx-xxxx', objectives: 'เพื่อฟื้นฟูธรรมชาติชายฝั่ง ทัศนศึกษาป่าชายเลน และทำกิจกรรมปลูกป่าทดแทน', registration_deadline: '2026-06-25', description: 'กิจกรรมปลูกป่าชายเลนเพื่อเฉลิมพระเกียรติฯ เป็นกิจกรรมเปิดกว้างที่เปิดรับนิสิตทุกคณะร่วมฟื้นฟูระบบนิเวศชายฝั่ง พร้อมเรียนรู้ระบบนิเวศป่าชายเลนอย่างใกล้ชิด', schedule: '06:00 - พร้อมกันหน้าคณะ และเริ่มเดินทาง\n10:30 - ถึงจุดปลูกป่าและฟังบรรยาย\n11:00 - 14:00 - ปลูกป่าชายเลนและเดินศึกษาธรรมชาติ\n15:00 - เดินทางกลับ UBU' },
  ];

  function findEvent(id) {
    return DEFAULT_EVENTS.find((e) => e.id === id);
  }

  function loadEventMap() {
    const params = new URLSearchParams(window.location.search);
    const eventId = parseInt(params.get('id'), 10);
    if (!eventId) {
      document.getElementById('ev-name-header').textContent = 'ไม่พบรหัสกิจกรรม';
      return;
    }

    const ev = findEvent(eventId);
    if (!ev || !ev.gps) {
      document.getElementById('ev-name-header').textContent = 'กิจกรรมนี้ไม่มีข้อมูล GPS';
      return;
    }

    document.getElementById('ev-name-header').textContent = ev.name;
    document.getElementById('gps-lat').textContent = ev.lat;
    document.getElementById('gps-lng').textContent = ev.lng;
    document.getElementById('gps-radius').textContent = ev.radius + ' เมตร';
    document.getElementById('ev-subcat').textContent = ev.subcategory || 'กิจกรรมทั่วไป';
    document.getElementById('ev-name').textContent = ev.name;
    document.getElementById('ev-date').textContent = thDate(ev.date) + ' • ' + ev.credits.toFixed(1) + ' หน่วยกิต';
    document.getElementById('ev-location-text').textContent = ev.location || 'คณะวิทยาศาสตร์ ม.อุบลราชธานี';

    const map = L.map('map', {
      center: [ev.lat, ev.lng],
      zoom: 16,
      scrollWheelZoom: true,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    const mapIcon = L.divIcon({
      html: `<div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg border-2 border-white" style="box-shadow: 0 0 0 4px rgba(37,99,235,0.2);">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>`,
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 40],
    });

    L.marker([ev.lat, ev.lng], { icon: mapIcon }).addTo(map)
      .bindPopup(`
        <div class="text-sm font-sans" style="font-family:Sarabun,Inter,sans-serif">
          <p class="font-bold text-slate-800">${ev.name}</p>
          <p class="text-xs text-slate-500 mt-0.5">${ev.location || ''}</p>
          <p class="text-xs text-slate-400 mt-1">${thDate(ev.date)}</p>
        </div>
      `).openPopup();

    L.circle([ev.lat, ev.lng], {
      radius: ev.radius,
      color: '#2563eb',
      fillColor: '#2563eb',
      fillOpacity: 0.08,
      weight: 2,
      dashArray: '6, 4',
    }).addTo(map).bindPopup(`<div class="text-xs font-sans" style="font-family:Sarabun,Inter,sans-serif">รัศมี ${ev.radius} เมตร</div>`);

    map.fitBounds(L.circle([ev.lat, ev.lng], { radius: ev.radius }).getBounds().pad(0.3));
  }

  document.addEventListener('DOMContentLoaded', loadEventMap);
</script>
</body>
</html>
