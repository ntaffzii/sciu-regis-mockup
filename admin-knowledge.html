<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการฐานความรู้ RAG — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <nav class="flex items-center gap-2 text-sm text-slate-400" aria-label="breadcrumb">
      <a href="admin-home.html" class="hover:text-blue-600 transition inline-flex items-center gap-1" id="bc-home">แผงควบคุม</a>
      <span class="text-slate-300">/</span>
      <span class="text-slate-600 font-medium">ฐานความรู้ RAG</span>
    </nav>

    <div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">จัดการฐานความรู้ RAG</h1>
      <p class="text-sm text-slate-500 mt-1">อัปโหลด PDF ระเบียบ/คู่มือ — ระบบอ่าน text layer, OCR ไฟล์สแกน (Typhoon-OCR) แล้ว embed ด้วย bge-m3 (1024D) ลง pgvector</p>
    </div>

    <!-- Dropzone -->
    <div id="kb-dropzone" class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:border-blue-500 hover:bg-blue-50/30 transition cursor-pointer">
      <div class="space-y-3">
        <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mx-auto text-slate-400" id="dz-icon"></div>
        <div>
          <p class="text-sm font-medium text-slate-700">ลากวางไฟล์ PDF ที่นี่ หรือคลิกเพื่อเลือก</p>
          <p class="text-xs text-slate-400 mt-1">รองรับ PDF สูงสุด 15 MB — ไฟล์สแกนจะผ่าน OCR อัตโนมัติ</p>
        </div>
      </div>
    </div>
    <input id="kb-file" type="file" accept=".pdf" class="hidden" aria-label="เลือกไฟล์ PDF">

    <div id="kb-table" class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm"></div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/admin.js"></script>
<script>
  renderShell({ role: 'admin', active: 'admin-knowledge.html', title: 'จัดการฐานความรู้ RAG' });
  document.getElementById('bc-home').insertAdjacentHTML('afterbegin', icon('home', 'w-4 h-4'));
  document.getElementById('dz-icon').innerHTML = icon('upload-cloud', 'w-8 h-8');
  initKnowledgePage();
</script>
</body>
</html>
