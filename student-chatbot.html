<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SciU-Buddy — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col" style="min-height: calc(100vh - 220px);">

    <div class="flex items-center gap-3 mb-4">
      <span class="w-11 h-11 rounded-full bg-gradient-to-br from-blue-600 to-blue-400 text-white flex items-center justify-center shadow-md shadow-blue-600/20" id="buddy-avatar"></span>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-slate-900">SciU-Buddy</h1>
        <p class="text-xs text-slate-400 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> ออนไลน์ — ผู้ช่วยกิจกรรมนักศึกษา คณะวิทยาศาสตร์
        </p>
      </div>
    </div>

    <!-- Chat log -->
    <div id="chat-log" class="flex-1 space-y-4 overflow-y-auto rounded-2xl border border-slate-200 bg-slate-50/60 p-4 min-h-[320px] max-h-[52vh]"></div>

    <!-- Suggestions -->
    <div id="chat-suggest" class="flex flex-wrap gap-2 mt-3"></div>

    <!-- Input -->
    <form id="chat-form" class="mt-3 flex gap-2">
      <input id="chat-input" type="text" placeholder="พิมพ์คำถามของคุณ..." autocomplete="off"
             class="flex-1 px-4 py-3 rounded-2xl border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-600/30 focus:border-blue-600" aria-label="พิมพ์ข้อความ">
      <button type="submit" class="w-12 h-12 shrink-0 inline-flex items-center justify-center bg-blue-600 text-white rounded-2xl hover:bg-blue-800 transition shadow-lg shadow-blue-600/20" aria-label="ส่งข้อความ" id="btn-send"></button>
    </form>
    <p class="text-[10px] text-slate-400 text-center mt-2">SciU-Buddy ตอบจากฐานความรู้ของคณะ (RAG + MCP tools) — เมื่อตอบไม่ได้จะแจ้งเจ้าหน้าที่ให้อัตโนมัติ</p>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/student.js"></script>
<script>
  const isGuest = new URLSearchParams(location.search).get('role') === 'guest';
  renderShell({ role: isGuest ? 'guest' : 'student', active: 'student-chatbot.html', title: 'SciU-Buddy' });
  document.getElementById('buddy-avatar').innerHTML = icon('robot', 'w-6 h-6');
  document.getElementById('btn-send').innerHTML = icon('send', 'w-5 h-5');
  initChatbotPage();
</script>
</body>
</html>
