<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ส่งหลักฐานกิจกรรมนอกสถานที่ — SciU-Regis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { primary: { DEFAULT: '#2563eb', dark: '#1e40af', light: '#eff6ff' } },
    } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-900">

<main class="flex-1 pt-14 lg:pt-16 pb-20 lg:pb-8">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900">ส่งหลักฐานกิจกรรมนอกสถานที่</h1>
      <p class="text-sm text-slate-500 mt-1">กรอกข้อมูลกิจกรรมด้วยตนเองตามเอกสารกระดาษ (ไม่ใช้ OCR) แล้วแนบรูปให้เจ้าหน้าที่ตรวจสอบ — 3 ชั่วโมง = 1 หน่วย</p>
    </div>

    <!-- โควต้าคงเหลือ -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm" id="pu-progress"></div>

    <!-- เลือกช่องทางส่ง -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
      <p class="text-sm font-semibold text-slate-700">เลือกช่องทางส่งหลักฐาน</p>
      <div id="pu-method-tabs" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
      <p id="pu-method-hint" class="text-xs text-slate-400 leading-relaxed"></p>
    </div>

    <div id="pu-form-wrap"></div>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/student.js"></script>
<script>
  renderShell({ role: 'student', active: 'student-proof-upload.html', title: 'ส่งหลักฐาน' });
  initProofUploadPage();
</script>
</body>
</html>
